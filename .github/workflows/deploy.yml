name: Deploy Signal & Noise to WordPress

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage theme to /tmp
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -rlvz --delete --exclude='.git' --exclude='.github' --exclude='composer.lock' --exclude='.gitignore' --exclude='README.md'
          path: ./
          remote_path: /tmp/sn-deploy/
          remote_host: ${{ secrets.CLOUDWAYS_SSH_HOST }}
          remote_user: ${{ secrets.CLOUDWAYS_SSH_USER }}
          remote_key: ${{ secrets.CLOUDWAYS_SSH_KEY }}

      - name: Install theme and purge caches
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CLOUDWAYS_SSH_HOST }}
          username: ${{ secrets.CLOUDWAYS_SSH_USER }}
          key: ${{ secrets.CLOUDWAYS_SSH_KEY }}
          script: |
            APP=/home/master/applications/nffqxsrgxz/public_html

            # Zip staged files and install via WP CLI (runs as PHP user, has write perms)
            cd /tmp/sn-deploy
            zip -qr /tmp/signal-and-noise.zip .
            cd "$APP"
            wp theme install /tmp/signal-and-noise.zip --force --path=. 2>&1

            # Clean up
            rm -rf /tmp/sn-deploy /tmp/signal-and-noise.zip

            # Purge caches
            wp cache flush --path=. 2>/dev/null || true
            wp transient delete --all --path=. 2>/dev/null || true
            rm -rf wp-content/cache/breeze-minification/* 2>/dev/null || true
            rm -rf wp-content/cache/breeze/* 2>/dev/null || true

            # Warm homepage cache
            curl -s -o /dev/null https://juanlentino.com/ || true
