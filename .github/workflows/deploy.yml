name: Deploy to Cloudways

# v8.5.1+: tag pushes no longer auto-deploy. Theme updates land via
# the WP admin Updates page (inc/wp-update-integration.php registers
# the theme with WP's native update system and renames the unpacked
# GitHub archive so WP installs to the correct stylesheet slug).
# workflow_dispatch remains as a manual emergency-hotfix fallback —
# trigger from the GitHub Actions UI or via:
#   gh workflow run deploy.yml --ref vX.Y.Z
on:
  workflow_dispatch:

# Serialise deploys: if a new tag fires while one is in flight, queue
# rather than cancel — never drop a release.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Cloudways git pull + SSH cache purge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Authenticate with Cloudways
        id: auth
        env:
          CW_EMAIL: ${{ secrets.CLOUDWAYS_EMAIL }}
          CW_API_KEY: ${{ secrets.CLOUDWAYS_API_KEY }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w '\n%{http_code}' -X POST 'https://api.cloudways.com/api/v1/oauth/access_token' \
            -H 'User-Agent: signal-and-noise-deploy/1.0 (GitHub Actions)' \
            -H 'Accept: application/json' \
            --data-urlencode "email=$CW_EMAIL" \
            --data-urlencode "api_key=$CW_API_KEY")
          status=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')
          printf 'HTTP %s\n' "$status"
          if [ "$status" != "200" ]; then
            printf 'Auth failed. Body: %s\n' "$body"
            exit 1
          fi
          token=$(printf '%s' "$body" | jq -r '.access_token // empty')
          if [ -z "$token" ]; then
            printf 'Token extraction failed. Body: %s\n' "$body"
            exit 1
          fi
          printf '::add-mask::%s\n' "$token"
          printf 'token=%s\n' "$token" >> "$GITHUB_OUTPUT"

      - name: Trigger git pull (theme deploy path)
        env:
          CW_TOKEN: ${{ steps.auth.outputs.token }}
          CW_SERVER_ID: ${{ secrets.CLOUDWAYS_SERVER_ID }}
          CW_APP_ID: ${{ secrets.CLOUDWAYS_APP_ID }}
        run: |
          set -euo pipefail
          response=$(curl -sS -w '\n%{http_code}' -X POST 'https://api.cloudways.com/api/v1/git/pull' \
            -H "Authorization: Bearer $CW_TOKEN" \
            --data-urlencode "server_id=$CW_SERVER_ID" \
            --data-urlencode "app_id=$CW_APP_ID" \
            --data-urlencode "branch_name=main" \
            --data-urlencode "deploy_path=wp-content/themes/signal-and-noise")
          status=$(printf '%s' "$response" | tail -n1)
          body=$(printf '%s' "$response" | sed '$d')
          printf 'HTTP %s\n' "$status"
          printf '%s\n' "$body"
          case "$status" in
            200|202) ;;
            *) exit 1 ;;
          esac

      - name: Configure SSH for Cloudways
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Purge caches via WP-CLI in-process (no App Password required)
        # v9.1.4 architecture change: replaces the HTTP REST-based purge that
        # required WP_DEPLOY_USER + WP_DEPLOY_APP_PASSWORD. The actual purge
        # work (object cache + Breeze + Varnish + Cloudflare + template
        # overrides) lives in the theme's `sn_purge_all_caches_result`
        # filter at inc/template-maintenance.php. We invoke it via `wp eval`
        # over SSH using the same app-scoped sn-plugin SSH user the plugin
        # repo uses — auth is established via the deploy SSH key, so no HTTP
        # Basic Auth and no rotatable App Password is involved. After
        # v9.1.4 ships, WP_DEPLOY_USER and WP_DEPLOY_APP_PASSWORD GH secrets
        # can be deleted.
        #
        # NOTE on the empty `array()` arg: theme deploys explicitly want
        # `template_overrides => true` (the default inside
        # sn_purge_all_caches), because theme updates are precisely the case
        # where stale wp_template / wp_template_part DB records mask the
        # updated theme files. The plugin repo's deploy passes
        # `template_overrides => false` because plugin updates don't touch
        # theme files; the theme deploy is the opposite case. The 2026-05-07
        # "/notes still showing one card after Update" incident (documented
        # in inc/template-maintenance.php) is exactly why this default exists.
        #
        # Continue-on-error mirrors the plugin pattern: the git pull above
        # has already landed the files on Cloudways, and a missed cache
        # purge is a latency artifact, not a deploy failure. If wp-cli is
        # unavailable or the filter fails, CF edge revalidates naturally via
        # last-modified headers on every theme asset.
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          # Let Cloudways' git pull settle + OPcache invalidate.
          sleep 5
          ssh "$SSH_USER@$SSH_HOST" bash -s <<'REMOTE'
          set -euo pipefail
          # Auto-discover the app's public_html. Cloudways uses random
          # per-app directory names (e.g. nffqxsrgxz); the sn-plugin SSH
          # user has read access only to its own app, so this glob matches
          # exactly one entry — same lookup pattern as the plugin's deploy.
          APP_PUBLIC=$(ls -d /home/master/applications/*/public_html 2>/dev/null | head -1)
          if [ -z "$APP_PUBLIC" ]; then
            echo "::warning::Could not locate app public_html for wp-cli."
            exit 1
          fi
          cd "$APP_PUBLIC"
          # Verify wp-cli is on PATH (Cloudways ships it for app-scoped
          # SSH users on all apps; explicit check survives a future
          # Cloudways base-image change).
          if ! command -v wp >/dev/null 2>&1; then
            echo "::warning::wp-cli not found on PATH for SSH_USER. CF edge will revalidate naturally."
            exit 1
          fi
          # Call SN's purge filter in-process. The theme's
          # inc/template-maintenance.php registers a filter handler that
          # purges object cache + Breeze + Varnish + Cloudflare + DB
          # template overrides (defaults all true). Returns purged count.
          count=$(wp eval 'echo (int) apply_filters("sn_purge_all_caches_result", 0, array());' 2>&1)
          echo "Purged $count caches via sn_purge_all_caches_result filter (template_overrides=true)."
          REMOTE
